services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cloudtune}
      POSTGRES_USER: ${POSTGRES_USER:-cloudtune}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudtune}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-cloudtune}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-replace-with-a-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
      PORT: ${BACKEND_PORT:-4000}
      HOST: ${BACKEND_HOST:-0.0.0.0}
      DATABASE_URL: ${DATABASE_URL:-postgres://cloudtune:cloudtune@postgres:5432/cloudtune}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-cloudtune}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-replace-with-a-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-cloudtune-media}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-strong-secret}
    volumes:
      - ./backend:/app
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
      - minio

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  minio_data: